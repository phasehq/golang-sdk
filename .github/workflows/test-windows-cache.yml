name: Windows Cache Atomicity Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-windows-cache:
    runs-on: windows-latest
    strategy:
      matrix:
        go-version: ['1.22', '1.23']
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Run Windows cache atomicity tests
        run: go test -race -v -run TestCacheWrite ./phase/
